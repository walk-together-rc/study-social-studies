function shuffleChoices(quiz){
  const idx=quiz.choices.map((c,i)=>({text:c,isAnswer:i===quiz.answer}));
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  return{...quiz,choices:idx.map(c=>c.text),answer:idx.findIndex(c=>c.isAnswer)};
}

              <div style={{height:6,background:"#FFD700",borderRadius:9,width:`${pct}%`,transition:"width .8s",boxShadow:pct>0?"0 0 6px rgba(255,215,0,.7)":"none"}}/>

            onTouchStart={e=>e.currentTarget.style.transform="scale(.97)"} onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}

            <div style={{marginLeft:"auto",fontSize:20}}>→</div>

          <div style={{fontWeight:700,fontSize:12,color:"#888",marginBottom:8}}>📚 単元を選んで！</div>

                  onTouchStart={e=>e.currentTarget.style.transform="scale(.97)"} onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}

                  <div style={{flex:1,minWidth:0}}>

                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:5}}>
                      <div style={{height:5,background:"#f0f0f0",borderRadius:9,flex:1}}>

                    </div>

                </div>
              );

        </div>
      </div>
    </div>
  );
}

function HistoryScreen({history,badges}){
  const CHART_DAYS=7,BAR_WIDTH=28;
  const days=useMemo(()=>{
    const map={};
    history.forEach(h=>{if(!map[h.date])map[h.date]={date:h.date,total:0,correct:0};map[h.date].total++;if(h.correct)map[h.date].correct++;});
    const result=[];
    for(let i=CHART_DAYS-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=d.toLocaleDateString("ja-JP",{month:"2-digit",day:"2-digit"});result.push(map[key]||{date:key,total:0,correct:0});}
    return result;
  },[history]);
  const maxTotal=Math.max(...days.map(d=>d.total),1);
  const CHART_H=110,chartWidth=CHART_DAYS*(BAR_WIDTH+8);
  const getX=i=>i*(BAR_WIDTH+8)+(BAR_WIDTH/2);
  const getY=d=>d.total===0?CHART_H:CHART_H-Math.max((d.correct/d.total)*CHART_H,4);
  const linePoints=days.map((d,i)=>({x:getX(i),y:getY(d),rate:d.total===0?null:Math.round((d.correct/d.total)*100)}));
  const validPoints=linePoints.filter(p=>p.rate!==null);
  const polyline=validPoints.map(p=>`${p.x},${p.y}`).join(" ");
  const totalAnswered=history.length,totalCorrect=history.filter(h=>h.correct).length,rate=totalAnswered>0?Math.round((totalCorrect/totalAnswered)*100):0;
  return(
    <div style={{padding:"20px 16px 90px"}}>
      <div style={{fontWeight:900,fontSize:18,color:"#333",marginBottom:16}}>📊 学習記録</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        {[{label:"解いた問題",value:totalAnswered,unit:"問",color:"#1565C0"},{label:"正解数",value:totalCorrect,unit:"問",color:"#66BB6A"},{label:"正解率",value:rate,unit:"%",color:"#FFA726"}].map(s=>(
          <div key={s.label} style={{background:"#fff",borderRadius:14,padding:"12px 8px",textAlign:"center",boxShadow:"0 2px 10px rgba(0,0,0,.06)"}}>
            <div style={{fontSize:22,fontWeight:900,color:s.color}}>{s.value}<span style={{fontSize:12}}>{s.unit}</span></div>
            <div style={{fontSize:10,color:"#aaa",marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:20,padding:"16px",boxShadow:"0 3px 16px rgba(0,0,0,.07)",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:13,color:"#555",marginBottom:10}}>🏅 ゲットしたバッジ</div>
        {badges.length===0?(<div style={{fontSize:12,color:"#ccc",textAlign:"center",padding:"10px 0"}}>クイズを解いてバッジをゲットしよう！</div>):(
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {badges.map(b=>(<div key={b.id} style={{background:"#FFF9C4",border:"2px solid #FFD700",borderRadius:12,padding:"6px 10px",fontSize:11,display:"flex",alignItems:"center",gap:4,fontWeight:700}}>
              <span>{b.emoji}</span><div><div>{b.label}</div><div style={{fontSize:9,color:"#999",fontWeight:500}}>{b.desc}</div></div>
            </div>))}
          </div>
        )}
      </div>
      <div style={{background:"#fff",borderRadius:20,padding:"18px 14px",boxShadow:"0 3px 16px rgba(0,0,0,.07)",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:13,color:"#555",marginBottom:2}}>日ごとの学習の様子（直近7日）</div>
        <div style={{fontSize:10,color:"#aaa",marginBottom:10}}>棒グラフ：解いた問題数　折れ線：正解率</div>
        {days.every(d=>d.total===0)?(<div style={{textAlign:"center",padding:"20px 0",color:"#ccc",fontSize:13}}>まだ記録がないよ。問題を解くと記録されるよ！</div>):(
          <div style={{display:"flex"}}>
            <div style={{display:"flex",flexDirection:"column",justifyContent:"space-between",height:CHART_H+20,paddingBottom:20,width:26,flexShrink:0}}>
              {[maxTotal,Math.round(maxTotal/2),0].map((v,i)=><div key={i} style={{fontSize:9,color:"#bbb",textAlign:"right"}}>{v}</div>)}
            </div>
            <div style={{flex:1,overflowX:"auto"}}>
              <div style={{position:"relative",width:chartWidth,height:CHART_H+20}}>
                <svg style={{position:"absolute",top:0,left:0}} width={chartWidth} height={CHART_H}>
                  {[0,.5,1].map((r,i)=><line key={i} x1={0} y1={CHART_H*r} x2={chartWidth} y2={CHART_H*r} stroke="#f0f0f0" strokeWidth={1}/>)}
                </svg>
                <div style={{display:"flex",gap:8,alignItems:"flex-end",height:CHART_H,position:"relative",zIndex:1}}>
                  {days.map((d,i)=>{const barH=d.total===0?2:Math.max((d.total/maxTotal)*CHART_H,4);return(
                    <div key={d.date} style={{width:BAR_WIDTH,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:CHART_H}}>
                      {d.total>0&&<div style={{fontSize:9,fontWeight:700,color:"#1565C0",marginBottom:2}}>{d.total}</div>}
                      <div style={{width:BAR_WIDTH,height:barH,background:d.total>0?"#BBDEFB":"#f5f5f5",borderRadius:"5px 5px 0 0"}}/>
                    </div>
                  );})}
                </div>
                {validPoints.length>=1&&(<svg style={{position:"absolute",top:0,left:0,zIndex:2,pointerEvents:"none"}} width={chartWidth} height={CHART_H}>
                  {validPoints.length>=2&&<polyline points={polyline} fill="none" stroke="#1565C0" strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>}
                  {linePoints.map((p,i)=>p.rate!==null?(<g key={i}><circle cx={p.x} cy={p.y} r={4} fill="#fff" stroke="#1565C0" strokeWidth={2}/><text x={p.x} y={p.y-7} textAnchor="middle" fontSize={9} fill="#1565C0" fontWeight={700}>{p.rate}%</text></g>):null)}
                </svg>)}
                <div style={{display:"flex",gap:8,height:20,alignItems:"center"}}>
                  {days.map(d=><div key={d.date} style={{width:BAR_WIDTH,flexShrink:0,textAlign:"center",fontSize:9,color:"#aaa"}}>{d.date}</div>)}
                </div>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",justifyContent:"space-between",height:CHART_H+20,paddingBottom:20,width:26,flexShrink:0}}>
              {["100%","50%","0%"].map((v,i)=><div key={i} style={{fontSize:9,color:"#1565C0"}}>{v}</div>)}
            </div>
          </div>
        )}
      </div>
      <div style={{background:"#fff",borderRadius:20,padding:"18px 16px",boxShadow:"0 3px 16px rgba(0,0,0,.07)"}}>
        <div style={{fontWeight:700,fontSize:13,color:"#555",marginBottom:14}}>単元別 正解率</div>
        {UNITS.map(unit=>{
          const uH=history.filter(h=>h.unitId===unit.id);
          if(uH.length===0)return(<div key={unit.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{fontSize:18,width:24}}>{unit.emoji}</span><span style={{fontSize:12,color:"#aaa",flex:1}}>{unit.title}</span><span style={{fontSize:11,color:"#ccc"}}>未挑戦</span></div>);
          const r=Math.round((uH.filter(h=>h.correct).length/uH.length)*100);
          return(<div key={unit.id} style={{marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:16}}>{unit.emoji}</span><span style={{fontSize:12,fontWeight:700,color:"#444",flex:1}}>{unit.title}</span><span style={{fontSize:12,fontWeight:900,color:unit.color}}>{r}%</span></div>
            <div style={{height:6,background:"#f0f0f0",borderRadius:9}}><div style={{height:6,background:unit.color,borderRadius:9,width:`${r}%`,transition:"width .6s"}}/></div>
          </div>);
        })}
      </div>
    </div>
  );
}

function UnitScreen({unit,correctIds,resumeInfo,onStartSet,onBack}){
  const snd=useSound();
  const containerRef=useRef(null);
  useEffect(()=>{
    if(containerRef.current)containerRef.current.scrollTop=0;
    window.scrollTo(0,0);
  },[unit]);
  const{done,total}=calcUnitProgress(unit,correctIds);
  const prevStars=done===total?3:done>=Math.ceil(total/2)?2:done>0?1:0;
  return(
    <div ref={containerRef} style={{paddingBottom:80}}>
      <div style={{background:`linear-gradient(135deg,${unit.color}dd,${unit.color}88)`,borderRadius:"0 0 28px 28px",padding:"18px 20px 16px",color:"#fff"}}>
        <button onClick={()=>{snd.tap();onBack();}} style={{background:"rgba(255,255,255,.25)",border:"none",color:"#fff",borderRadius:10,padding:"5px 12px",fontWeight:700,cursor:"pointer",marginBottom:14}}>← もどる</button>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,opacity:.8,letterSpacing:1}}>{unit.topics[0]}</div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:"-.5px",marginTop:1}}>{unit.emoji} {unit.title}</div>
            <div style={{fontSize:10,opacity:.7,marginTop:1}}>10問×3セット・全{unit.quizzes.length}問</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:26,fontWeight:900,lineHeight:1}}>{Math.round((done/total)*100)}<span style={{fontSize:13}}>%</span></div>
            <div style={{fontSize:9,opacity:.8,marginBottom:5}}>クリア率</div>
            <div style={{height:6,background:"rgba(255,255,255,.25)",borderRadius:9,width:80}}>
              <div style={{height:6,background:"#FFD700",borderRadius:9,width:`${Math.round((done/total)*100)}%`,transition:"width .8s"}}/>
            </div>
          </div>
        </div>
      </div>
      <div style={{padding:"18px 16px"}}>
        {prevStars>0&&(<div style={{background:"#FFF9C4",border:"2px solid #FFD700",borderRadius:14,padding:"10px 14px",marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#B8860B"}}>これまでの記録</div>
          <Stars count={prevStars}/>
          <div style={{fontSize:11,color:"#aaa",marginTop:4}}>{done}/{total}問 正解済み</div>
        </div>)}
        <div style={{fontWeight:700,fontSize:13,color:"#555",marginBottom:10}}>📖 セットを選んで挑戦しよう！</div>
        {unit.sets.map((set,si)=>{
          const setCorrect=set.quizzes.filter(q=>correctIds.has(q.id)).length;
          const setTotal=set.quizzes.length,setDone=setCorrect===setTotal;
          const ri=resumeInfo[`${unit.id}-${si}`]||0,hasResume=ri>0&&ri<setTotal;
          return(
            <div key={si} style={{background:"#fff",borderRadius:16,padding:"14px",marginBottom:10,boxShadow:"0 2px 10px rgba(0,0,0,.06)",border:`2px solid ${setDone?unit.color:"#eee"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:28,height:28,background:unit.bg,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:unit.color,flexShrink:0}}>{si+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#333"}}>{set.setLabel}</div>
                  <div style={{fontSize:11,color:"#aaa"}}>{setCorrect}/{setTotal}問正解</div>
                </div>
                {setDone&&<span style={{fontSize:18}}>✅</span>}
              </div>
              <div style={{height:4,background:"#f0f0f0",borderRadius:9,marginBottom:10}}>
                <div style={{height:4,background:unit.color,borderRadius:9,width:`${(setCorrect/setTotal)*100}%`,transition:"width .5s"}}/>
              </div>
              <button onClick={()=>{snd.tap();onStartSet(si,false);}} style={{width:"100%",background:`linear-gradient(135deg,${unit.color},${unit.color}bb)`,color:"#fff",border:"none",borderRadius:12,padding:"11px",fontSize:14,fontWeight:800,cursor:"pointer"}}>
                {hasResume?"⏭ 続きから":"🎮 このセットに挑戦！"} ({setTotal}問)
              </button>
              {hasResume&&(<button onClick={()=>{snd.tap();onStartSet(si,true);}} style={{width:"100%",background:"#fff",color:"#888",border:"1px solid #eee",borderRadius:12,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer",marginTop:6}}>最初からやり直す</button>)}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function QuizScreen({quizzes,unitColor,unitEmoji,unitTitle,isRetry,startIndex=0,onComplete,onAbort}){
  const snd=useSound();
  const[shuffledQuizzes]=useState(()=>quizzes.map(q=>shuffleChoices(q)));
  const[current,setCurrent]=useState(startIndex);
  const[selected,setSelected]=useState(null);
  const[results,setResults]=useState([]);
  const[showHint,setShowHint]=useState(false);
  const[streak,setStreak]=useState(0);
  const[startTime,setStartTime]=useState(Date.now());
  const[fastAnswer,setFastAnswer]=useState(false);
  const[confetti,setConfetti]=useState(false);
  const[finished,setFinished]=useState(false);
  const[newBadges,setNewBadges]=useState([]);
  const quiz=shuffledQuizzes[current];
  const isLast=current===shuffledQuizzes.length-1;
  const color=unitColor||"#1565C0";
  useEffect(()=>{setStartTime(Date.now());setShowHint(false);setSelected(null);setFastAnswer(false);},[current]);
  const handleSelect=(idx)=>{
    if(selected!==null)return;
    const elapsed=(Date.now()-startTime)/1000;
    const correct=idx===quiz.answer;
    setSelected(idx);
    const newResults=[...results,{quizId:quiz.id,correct}];
    setResults(newResults);
    const newStreak=correct?streak+1:0;setStreak(newStreak);
    const fast=elapsed<=5&&correct;setFastAnswer(fast);
    if(correct){if(newStreak>=3)snd.streak();else snd.correct();setConfetti(true);setTimeout(()=>setConfetti(false),2000);}
    else snd.wrong();
    if(isLast){
      setTimeout(()=>{
        const cc=newResults.filter(r=>r.correct).length;
        const stars=cc===shuffledQuizzes.length?3:cc>=Math.ceil(shuffledQuizzes.length/2)?2:1;
        const earned=[];
        if(!isRetry&&newResults.length<=1)earned.push("first_quiz");
        if(newStreak>=3)earned.push("streak3");
        if(fast)earned.push("fast_answer");
        if(cc===shuffledQuizzes.length){earned.push("perfect_set");if(shuffledQuizzes.length>=30)earned.push("perfect");if(isRetry)earned.push("retry_clear");}
        if(earned.length>0)snd.badge();else snd.clear();
        setNewBadges(earned);setFinished(true);onComplete(newResults,stars,earned);
      },1200);
    }
  };
  if(finished){
    const cc=results.filter(r=>r.correct).length;
    const stars=cc===shuffledQuizzes.length?3:cc>=Math.ceil(shuffledQuizzes.length/2)?2:1;
    return(
      <div style={{padding:"32px 20px",textAlign:"center",paddingBottom:90}}>
        <Confetti active={stars===3}/>
        <div style={{fontSize:64}}>{stars===3?"🏆":stars===2?"🥈":"🥉"}</div>
        <div style={{fontSize:24,fontWeight:900,color:"#333",marginTop:10}}>{stars===3?"かんぺき！！":stars===2?"よくできました！":"がんばったね！"}</div>
        <div style={{fontSize:15,color:"#666",marginTop:8}}>{shuffledQuizzes.length}問中 <span style={{fontWeight:900,fontSize:20,color}}>{cc}</span>問 正解！</div>
        <div style={{marginTop:12}}><Stars count={stars}/></div>
        {newBadges.length>0&&(<div style={{margin:"18px 0",background:"#FFF9C4",borderRadius:16,padding:14,border:"2px solid #FFD700"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#B8860B",marginBottom:6}}>🎉 バッジをゲット！</div>
          {newBadges.map(id=>{const b=BADGES.find(x=>x.id===id);return b?<div key={id} style={{fontSize:13,marginBottom:3}}>{b.emoji} <strong>{b.label}</strong> — {b.desc}</div>:null;})}
        </div>)}
        <button onClick={()=>onAbort([])} style={{marginTop:16,background:`linear-gradient(135deg,${color},${color}99)`,color:"#fff",border:"none",borderRadius:20,padding:"14px 40px",fontSize:16,fontWeight:900,cursor:"pointer"}}>ホームにもどる 🏠</button>
      </div>
    );
  }
  return(
    <div style={{paddingBottom:80}}>
      <Confetti active={confetti&&selected===quiz.answer}/>
      <div style={{background:`linear-gradient(135deg,${color}cc,${color}88)`,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>onAbort(results)} style={{background:"rgba(255,255,255,.3)",border:"none",color:"#fff",borderRadius:10,padding:"4px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>✕</button>
        <div style={{color:"#fff",fontWeight:800,fontSize:13}}>{unitEmoji} {unitTitle}</div>
        <div style={{background:"rgba(255,255,255,.25)",borderRadius:10,padding:"3px 10px",color:"#fff",fontWeight:900,fontSize:13}}>{current+1}/{shuffledQuizzes.length}</div>
      </div>
      <div style={{height:6,background:"#f0f0f0"}}><div style={{height:6,background:color,width:`${((current+(selected!==null?1:0))/shuffledQuizzes.length)*100}%`,transition:"width .4s"}}/></div>
      {streak>=2&&<div style={{background:"#FFF3E0",padding:"5px 16px",textAlign:"center",fontSize:12,fontWeight:700,color:"#E65100"}}>🔥 {streak}連続正解中！</div>}
      <div style={{padding:"16px"}}>
        <div style={{background:"#fff",borderRadius:22,padding:"18px",boxShadow:"0 5px 20px rgba(0,0,0,.08)",marginBottom:16}}>
          {quiz.img&&<div style={{marginBottom:10}}>{quiz.img}</div>}
          {!quiz.img&&<div style={{fontSize:32,textAlign:"center",marginBottom:10}}>{quiz.emoji}</div>}
          <div style={{fontSize:15,fontWeight:800,color:"#333",lineHeight:1.65,textAlign:"center"}}>{quiz.q}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {quiz.choices.map((ch,i)=>{
            const isCorrect=i===quiz.answer,isSel=i===selected;
            let bg="#fff",border="2px solid #eee",col="#333";
            if(selected!==null){if(isCorrect){bg="#E8F5E9";border="2px solid #66BB6A";col="#2E7D32";}else if(isSel){bg="#FFEBEE";border="2px solid #EF5350";col="#C62828";}}
            return(<button key={i} onClick={()=>handleSelect(i)} style={{background:bg,border,borderRadius:14,padding:"12px 14px",fontSize:13,fontWeight:700,color:col,cursor:selected!==null?"default":"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
              <span style={{width:28,height:28,background:selected!==null?(isCorrect?"#66BB6A":isSel?"#EF5350":"#f0f0f0"):"#EEF2FF",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:selected!==null?(isCorrect||isSel?"#fff":"#aaa"):color,flexShrink:0}}>{["A","B","C","D"][i]}</span>
              <span style={{flex:1}}>{ch}</span>
              {selected!==null&&isCorrect&&<span>✅</span>}
              {selected!==null&&isSel&&!isCorrect&&<span>❌</span>}
            </button>);
          })}
        </div>
        {selected===null&&(<button onClick={()=>setShowHint(h=>!h)} style={{marginTop:12,background:"transparent",border:"2px dashed #e0e0e0",borderRadius:12,padding:"9px 16px",color:"#bbb",fontSize:12,fontWeight:700,cursor:"pointer",width:"100%"}}>💡 ヒントを見る</button>)}
        {showHint&&selected===null&&(<div style={{marginTop:6,background:"#FFFDE7",borderRadius:12,padding:"10px 14px",fontSize:12,color:"#795548",border:"1px solid #FFD54F",fontWeight:600}}>💡 {quiz.hint}</div>)}
        {selected!==null&&(
          <div style={{marginTop:14}}>
            <div style={{background:selected===quiz.answer?"#E8F5E9":"#FFEBEE",borderRadius:14,padding:"12px 14px",fontSize:13,color:selected===quiz.answer?"#2E7D32":"#C62828",fontWeight:700,marginBottom:10}}>
              {selected===quiz.answer?`🎉 正解！${fastAnswer?" ⚡ はやい！":""}`:`😅 ざんねん！正解は「${quiz.choices[quiz.answer]}」`}
              <div style={{fontWeight:600,marginTop:4,fontSize:12}}>💡 {quiz.hint}</div>
            </div>
            {!isLast&&(<button onClick={()=>{snd.tap();setCurrent(c=>c+1);}} style={{width:"100%",background:`linear-gradient(135deg,${color},${color}aa)`,color:"#fff",border:"none",borderRadius:14,padding:"13px",fontSize:15,fontWeight:900,cursor:"pointer"}}>次の問題へ →</button>)}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("home");
  const[screen,setScreen]=useState("home");
  const[activeUnit,setActiveUnit]=useState(null);
  const[activeSetIdx,setActiveSetIdx]=useState(0);
  const[restartFromZero,setRestartFromZero]=useState(false);
  const[correctIdsMap,setCorrectIdsMap]=useState(()=>{
    const saved=loadState();
    if(saved?.correctIdsMap){const r={};for(const[k,v]of Object.entries(saved.correctIdsMap)){r[Number(k)]=new Set(v);}return r;}
    return{};
  });
  const[resumeInfo,setResumeInfo]=useState(()=>{const saved=loadState();return saved?.resumeInfo||{};});
  const[wrongQuizIds,setWrongQuizIds]=useState(()=>{const saved=loadState();return saved?.wrongQuizIds||[];});
  const[history,setHistory]=useState(()=>{const saved=loadState();return saved?.history||[];});
  const[earnedBadges,setEarnedBadges]=useState(()=>{const saved=loadState();return saved?BADGES.filter(b=>(saved.earnedBadgeIds||[]).includes(b.id)):[];});
  useEffect(()=>{
    const ser={};for(const[k,v]of Object.entries(correctIdsMap)){ser[k]=[...v];}
    saveState({correctIdsMap:ser,resumeInfo,wrongQuizIds,history,earnedBadgeIds:earnedBadges.map(b=>b.id)});
  },[correctIdsMap,resumeInfo,wrongQuizIds,history,earnedBadges]);
  const addCorrectIds=useCallback((unitId,quizIds)=>{
    if(!unitId||quizIds.length===0)return;
    setCorrectIdsMap(prev=>{const next={...prev};const ex=new Set(next[unitId]||[]);quizIds.forEach(id=>ex.add(id));next[unitId]=ex;return next;});
  },[]);
  const saveResults=useCallback((results,unitId,isRetryMode)=>{
    if(results.length===0)return;
    const date=todayStr();
    setHistory(h=>[...h,...results.map(r=>({date,unitId,quizId:r.quizId,correct:r.correct}))]);
    const correctedIds=results.filter(r=>r.correct).map(r=>r.quizId);
    if(unitId&&correctedIds.length>0)addCorrectIds(unitId,correctedIds);
    setWrongQuizIds(prev=>{const s=new Set(prev);results.forEach(r=>{if(r.correct)s.delete(r.quizId);else if(!isRetryMode)s.add(r.quizId);});return[...s];});
  },[addCorrectIds]);
  const handleComplete=useCallback((results,stars,newBadgeIds)=>{
    const unitId=activeUnit?.id,riKey=`${unitId}-${activeSetIdx}`;
    saveResults(results,unitId,screen==="retry");
    setResumeInfo(prev=>({...prev,[riKey]:0}));
    if(newBadgeIds?.length>0){setEarnedBadges(prev=>{const exist=new Set(prev.map(b=>b.id));const toAdd=BADGES.filter(b=>newBadgeIds.includes(b.id)&&!exist.has(b.id));return toAdd.length>0?[...prev,...toAdd]:prev;});}
    setTimeout(()=>{setCorrectIdsMap(cm=>{const allDone=UNITS.every(u=>u.quizzes.every(q=>(cm[u.id]||new Set()).has(q.id)));if(allDone)setEarnedBadges(prev=>{if(prev.find(b=>b.id==="all_units"))return prev;const b=BADGES.find(b=>b.id==="all_units");return b?[...prev,b]:prev;});return cm;});},100);
  },[activeUnit,activeSetIdx,screen,saveResults]);
  const handleAbort=useCallback((results)=>{
    const unitId=activeUnit?.id,riKey=`${unitId}-${activeSetIdx}`;
    saveResults(results,unitId,screen==="retry");
    if(unitId&&results.length>0&&screen!=="retry")setResumeInfo(prev=>({...prev,[riKey]:results.length}));
    setScreen("home");
  },[activeUnit,activeSetIdx,screen,saveResults]);
  const retryQuizzes=useMemo(()=>{const all=UNITS.flatMap(u=>u.quizzes);return wrongQuizIds.map(id=>all.find(q=>q.id===id)).filter(Boolean);},[wrongQuizIds]);
  const color=activeUnit?.color||"#1565C0";
  const activeQuizzes=activeUnit?activeUnit.sets[activeSetIdx]?.quizzes||[]:[];
  const riKey=activeUnit?`${activeUnit.id}-${activeSetIdx}`:"";
  const activeStartIdx=restartFromZero?0:(resumeInfo[riKey]||0);
  const activeCorrectIds=activeUnit?(correctIdsMap[activeUnit.id]||new Set()):new Set();
  return(
    <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",background:"#F0F4FF",fontFamily:"'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif",position:"relative"}}>
      <style>{`@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}button{-webkit-tap-highlight-color:transparent}`}</style>
      {tab==="home"&&screen==="home"&&<HomeScreen correctIdsMap={correctIdsMap} wrongQuizIds={wrongQuizIds} onStart={unit=>{setActiveUnit(unit);setActiveSetIdx(0);setRestartFromZero(false);setScreen("unit");window.scrollTo(0,0);}} onStartRetry={()=>setScreen("retry")}/>}
      {tab==="home"&&screen==="unit"&&activeUnit&&<UnitScreen unit={activeUnit} correctIds={activeCorrectIds} resumeInfo={resumeInfo} onStartSet={(si,fromZero)=>{setActiveSetIdx(si);setRestartFromZero(!!fromZero);setScreen("quiz");}} onBack={()=>{setScreen("home");window.scrollTo(0,0);}}/>}
      {tab==="home"&&screen==="quiz"&&activeUnit&&<QuizScreen quizzes={activeQuizzes} unitColor={color} unitEmoji={activeUnit.emoji} unitTitle={`${activeUnit.title} S${activeSetIdx+1}`} isRetry={false} startIndex={activeStartIdx} onComplete={handleComplete} onAbort={handleAbort}/>}
      {tab==="home"&&screen==="retry"&&<QuizScreen quizzes={retryQuizzes} unitColor="#FF9800" unitEmoji="📝" unitTitle="まちがい直し" isRetry={true} startIndex={0} onComplete={handleComplete} onAbort={handleAbort}/>}
      {tab==="history"&&<HistoryScreen history={history} badges={earnedBadges}/>}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"#fff",borderTop:"1px solid #e8eaf6",display:"flex",padding:"8px 0 12px",boxShadow:"0 -4px 20px rgba(0,0,0,.06)"}}>
        {[{id:"home",emoji:"🏠",label:"ホーム"},{id:"history",emoji:"📊",label:"学習記録"}].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);if(t.id==="home")setScreen("home");}} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,opacity:tab===t.id?1:.4,transition:"opacity .2s"}}>
            <span style={{fontSize:22}}>{t.emoji}</span>
            <span style={{fontSize:10,fontWeight:700,color:tab===t.id?"#1565C0":"#888"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
